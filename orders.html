<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Track your Desi Chamak orders">
    <meta name="keywords" content="Desi Chamak, orders, order tracking">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Desi Chamak | Orders</title>

    <link href="https://fonts.googleapis.com/css2?family=Cookie&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/bootstrap.min.css" type="text/css">
    <link rel="stylesheet" href="css/font-awesome.min.css" type="text/css">
    <link rel="stylesheet" href="css/elegant-icons.css" type="text/css">
    <link rel="stylesheet" href="css/jquery-ui.min.css" type="text/css">
    <link rel="stylesheet" href="css/magnific-popup.css" type="text/css">
    <link rel="stylesheet" href="css/owl.carousel.min.css" type="text/css">
    <link rel="stylesheet" href="css/slicknav.min.css" type="text/css">
    <link rel="stylesheet" href="css/style.css" type="text/css">
</head>
<body>
    <div id="preloder"><div class="loader"></div></div>

    <div class="offcanvas-menu-overlay"></div>
    <div class="offcanvas-menu-wrapper">
        <div class="offcanvas__close">+</div>
        <ul class="offcanvas__widget">
            <li><span class="icon_search search-switch"></span></li>
            <li><a href="./wishlist.html"><span class="icon_heart_alt"></span><div class="tip">0</div></a></li>
            <li><a href="./shop-cart.html"><span class="icon_bag_alt"></span><div class="tip">0</div></a></li>
        </ul>
        <div class="offcanvas__logo brand-mark">
            <a href="./index.html">Desi Chamak</a>
        </div>
        <div id="mobile-menu-wrap"></div>
        <nav class="header__menu mobile-only">
            <ul>
                <li><a href="./index.html">Home</a></li>
                <li><a href="./shop.html">Shop</a></li>
                <li class="active"><a href="./orders.html">Orders</a></li>
                <li><a href="./contact.html">Contact</a></li>
            </ul>
        </nav>
    </div>

    <header class="header">
        <div class="container-fluid">
            <div class="row">
                <div class="col-xl-3 col-lg-2">
                    <div class="header__logo brand-mark"><a href="./index.html">Desi Chamak</a></div>
                </div>
                <div class="col-xl-6 col-lg-7">
                    <nav class="header__menu">
                        <ul>
                            <li><a href="./index.html">Home</a></li>
                            <li><a href="./shop.html">Shop</a></li>
                            <li class="active"><a href="./orders.html">Orders</a></li>
                            <li><a href="./contact.html">Contact</a></li>
                        </ul>
                    </nav>
                </div>
                <div class="col-lg-3">
                    <div class="header__right">
                        <div class="header__right__auth">
                            <a href="./wishlist.html">Wishlist</a>
                            <a href="./orders.html">Orders</a>
                        </div>
                        <ul class="header__right__widget">
                            <li><span class="icon_search search-switch"></span></li>
                            <li><a href="./wishlist.html"><span class="icon_heart_alt"></span><div class="tip">0</div></a></li>
                            <li><a href="./shop-cart.html"><span class="icon_bag_alt"></span><div class="tip">0</div></a></li>
                        </ul>
                    </div>
                </div>
            </div>
            <div class="canvas__open"><i class="fa fa-bars"></i></div>
        </div>
    </header>

    <div class="breadcrumb-option">
        <div class="container">
            <div class="row">
                <div class="col-lg-12">
                    <div class="breadcrumb__links">
                        <a href="./index.html"><i class="fa fa-home"></i> Home</a>
                        <span>Orders</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <section class="shop-cart spad">
        <div class="container">
            <div class="row">
                <div class="col-lg-12">
                    <div class="section-title">
                        <h4>Your Orders</h4>
                        <p>Track order status using your order reference, email, or phone.</p>
                    </div>
                </div>
            </div>
            <form id="customer-orders-form" class="checkout__form mb-4" novalidate>
                <div class="row">
                    <div class="col-lg-4 col-md-6">
                        <div class="checkout__form__input">
                            <p>Order Reference</p>
                            <input type="text" id="customer-order-reference" placeholder="DC-1234567890">
                        </div>
                    </div>
                    <div class="col-lg-4 col-md-6">
                        <div class="checkout__form__input">
                            <p>Email</p>
                            <input type="email" id="customer-order-email" placeholder="you@example.com">
                        </div>
                    </div>
                    <div class="col-lg-4 col-md-6">
                        <div class="checkout__form__input">
                            <p>Phone</p>
                            <input type="text" id="customer-order-phone" placeholder="9876543210">
                        </div>
                    </div>
                    <div class="col-lg-12">
                        <button type="submit" class="site-btn">View Orders</button>
                        <p id="orders-page-status" class="mt-3 mb-0"></p>
                    </div>
                </div>
            </form>
            <div class="row" id="customer-orders-list">
                <div class="col-12"><div class="text-center p-5 border">Loading orders...</div></div>
            </div>
        </div>
    </section>

    <div class="search-model">
        <div class="h-100 d-flex align-items-center justify-content-center">
            <div class="search-close-switch">+</div>
            <form class="search-model-form">
                <input type="text" id="search-input" placeholder="Search oxidised jewellery...">
            </form>
        </div>
    </div>

    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jquery.magnific-popup.min.js"></script>
    <script src="js/jquery-ui.min.js"></script>
    <script src="js/mixitup.min.js"></script>
    <script src="js/jquery.countdown.min.js"></script>
    <script src="js/jquery.slicknav.js"></script>
    <script src="js/owl.carousel.min.js"></script>
    <script src="js/jquery.nicescroll.min.js"></script>
    <script src="js/api-base.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/orders.js"></script>
    <script src="js/wishlist.js"></script>
    <script src="js/main.js"></script>
    <script src="js/orders-page.js"></script>
</body>
</html>
